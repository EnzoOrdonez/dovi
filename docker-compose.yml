version: "3.9"

# DOVI — self-host single-tenant stack.
# Qdrant Float32 (ver plan §Stack). No binary quantization.

services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: dovi_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP
      - "6334:6334"   # gRPC
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  redis:
    image: redis:7.4-alpine
    container_name: dovi_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "1gb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dovi_backend
    restart: unless-stopped
    depends_on:
      - qdrant
      - redis
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app  # hot-reload en dev
      - ./data/whisper_models:/app/models
    extra_hosts:
      - "host.docker.internal:host-gateway"  # acceso a Ollama en host

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dovi_worker
    restart: unless-stopped
    depends_on:
      - redis
      - qdrant
    env_file:
      - .env
    command: ["dramatiq", "app.workers.tasks", "--processes", "2", "--threads", "4"]
    volumes:
      - ./backend/app:/app/app
      - ./data/whisper_models:/app/models
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
  redis_data:
